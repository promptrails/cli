version: 2
project_name: promptrails

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/promptrails
    binary: promptrails
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/promptrails/cli/internal/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

# Homebrew tap is updated manually from the published release artifacts.
# The brews: automation was removed because the tap PR flow is fragile and
# the token rotates often — keeping it in CI breaks the whole release job
# on every rotation. Update promptrails/homebrew-tap/promptrails.rb by hand
# after each tag.

release:
  github:
    owner: promptrails
    name: cli

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
